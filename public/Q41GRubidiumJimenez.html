<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarter 4 Movie Tracker</title>
    <style>
        /* CSS for a clean, presentable layout with a touch of blue */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            border-top: 5px solid #007bff;
        }

        h2 { color: #0056b3; margin-top: 0; }

        .form-group { margin-bottom: 15px; }
        
        label { display: block; font-weight: bold; margin-bottom: 5px; }

        input[type="text"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        /* Star Rating Styles */
        .star-rating {
            direction: rtl;
            display: inline-block;
            padding: 10px 0;
        }

        .star-rating input { display: none; }

        .star-rating label {
            color: #ccc;
            font-size: 2rem;
            padding: 0 2px;
            cursor: pointer;
            transition: color 0.2s;
            display: inline-block;
        }

        /* Changes stars to yellow when selected or hovered */
        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked ~ label {
            color: #f39c12;
        }

        button {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        button:hover { background-color: #0056b3; }

        /* Movie List Styles */
        #movieList {
            margin-top: 30px;
            width: 100%;
            max-width: 500px;
        }

        .movie-card {
            background: #fff;
            border-left: 5px solid #f39c12;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .rated-stars { color: #f39c12; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Add New Movie</h2>
        <form id="movieForm">
            <div class="form-group">
                <label for="title">Movie Title:</label>
                <input type="text" id="title" required placeholder="e.g. Wicked">
            </div>

            <div class="form-group">
                <label for="genre">Genre:</label>
                <select id="genre" required>
                    <option value="">--Select Genre--</option>
                    <option value="Animation">Animation</option>
                    <option value="Action">Action</option>
                    <option value="Adventure">Adventure</option>
                    <option value="Drama">Drama</option>
                    <option value="Historical">Historical</option>
                    <option value="Horror">Horror</option>
                    <option value="Musical">Musical</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Thriller">Thriller</option>
                </select>
            </div>

            <div class="form-group">
                <label>Rating:</label>
                <div class="star-rating">
                    <input type="radio" name="rating" id="star5" value="5"><label for="star5">★</label>
                    <input type="radio" name="rating" id="star4" value="4"><label for="star4">★</label>
                    <input type="radio" name="rating" id="star3" value="3"><label for="star3">★</label>
                    <input type="radio" name="rating" id="star2" value="2"><label for="star2">★</label>
                    <input type="radio" name="rating" id="star1" value="1"><label for="star1">★</label>

                </div>
                <button type ="submit">Add Movie to List</button>

                </form>
    </div>

    <div id="movieList">
        <h3>Movie List</h3>
        <div id="displayArea"></div>
    </div>

    <script>
        const movieForm = document.getElementById('movieForm');
        const displayArea = document.getElementById('displayArea');

        // Load existing data on page refresh
        window.onload = () => {
            displayMovies();
        };

        movieForm.addEventListener('submit', (e) => {
            e.preventDefault();

            // Capture form data
            const title = document.getElementById('title').value;
            const genre = document.getElementById('genre').value;
            const rating = document.querySelector('input[name="rating"]:checked')?.value || 0;

            // Create JS Object structure
            const movieEntry = {
                title: title,
                genre: genre,
                rating: parseInt(rating),
                dateAdded: new Date().toLocaleDateString()
            };

            // Retrieve existing data or initialize empty array
            let movies = JSON.parse(localStorage.getItem('movies')) || [];
            
            // Push new object and stringify for localStorage
            movies.push(movieEntry);
            localStorage.setItem('movies', JSON.stringify(movies));

            // Reset form and refresh list
            movieForm.reset();
            displayMovies();
        });

        function displayMovies() {
            const movies = JSON.parse(localStorage.getItem('movies')) || [];
            displayArea.innerHTML = '';

            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                
                // Create star string based on rating
                let starDisplay = '';
                for(let i = 1; i <= 5; i++) {
                    starDisplay += (i <= movie.rating) ? '★' : '☆';
                }

                card.innerHTML = `
                    <strong>${movie.title}</strong> (${movie.genre})<br>
                    <span class="rated-stars">${starDisplay}</span>
                `;
                displayArea.appendChild(card);
            });
        }
    </script>
</body>
</html>
